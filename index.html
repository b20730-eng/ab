<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>슬기로운 이화 생활</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

    <style>
        /* 온글잎 레디오 볼펜체 연동 */
        @import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2212@1.0/Ownglyph_RadioBolpen.woff2');

        body, input, button, textarea, select {
            font-family: 'Ownglyph_RadioBolpen', sans-serif;
            font-size: 1.5rem; 
            font-weight: 700;   
            letter-spacing: -0.02em;
            line-height: 1.4;
        }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .bg-ewha-pastel { background-color: #f3faf6; } 
        .bg-ewha-soft-green { background-color: #b2e4c4; } 
        .bg-ewha-deep { background-color: #0b532a; }
        .text-ewha-deep { color: #0b532a; }
        
        .spring-wire {
            width: 8px;
            height: 28px;
            background: linear-gradient(to right, #e2e8f0, #cbd5e1, #94a3b8);
            border-radius: 4px;
            position: absolute;
            top: -14px;
        }

        .hand-draw-dash {
            border: 4px dashed #b2e4c4;
            border-radius: 20px 10px 20px 12px/10px 20px 12px 20px;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-ewha-pastel text-stone-700 min-h-screen flex flex-col items-center justify-center p-6 select-none">

    <div class="w-full max-w-5xl bg-white rounded-3xl shadow-2xl border-4 border-emerald-800/10 relative min-h-[720px] flex flex-col justify-between overflow-visible">
        
        <div class="absolute -top-3 left-0 w-full px-12 flex justify-between z-10 pointer-events-none">
            <div class="relative"><div class="spring-wire"></div></div>
            <div class="relative"><div class="spring-wire"></div></div>
            <div class="relative"><div class="spring-wire"></div></div>
            <div class="relative"><div class="spring-wire"></div></div>
            <div class="relative"><div class="spring-wire"></div></div>
            <div class="relative"><div class="spring-wire"></div></div>
            <div class="relative"><div class="spring-wire"></div></div>
            <div class="relative"><div class="spring-wire"></div></div>
            <div class="relative"><div class="spring-wire"></div></div>
            <div class="relative"><div class="spring-wire"></div></div>
            <div class="relative"><div class="spring-wire"></div></div>
            <div class="relative"><div class="spring-wire"></div></div>
        </div>

        <div class="bg-stone-50/70 pt-8 pb-3 px-8 flex justify-between items-center border-b-4 border-dashed border-stone-100 rounded-t-3xl">
            <span class="text-base font-bold text-emerald-800/60 tracking-wider">🌸 EWHA HEALTH PLANNER</span>
            <div class="flex items-center space-x-4">

                <span class="text-sm font-bold text-stone-300">No. 2026</span>
            </div>
        </div>

        <div class="flex flex-grow w-full divide-x-4 divide-dashed divide-stone-100 transition-all duration-300">
            
            <div id="left-content" class="w-full p-8 flex flex-col justify-between min-h-[580px] transition-all duration-300">

                <div id="page-login" class="page active flex flex-col justify-between h-full flex-grow">
                    <div class="text-center my-auto py-6">
                        <div class="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-emerald-200 shadow-inner">
                            <span class="text-5xl">🥗</span>
                        </div>
                        <h1 class="text-5xl font-black text-ewha-deep tracking-tight mb-2">슬기로운 이화 생활</h1>

                        <div class="space-y-3 mb-6 max-w-sm mx-auto">

                        </div>
                        
                        <div class="flex justify-center space-x-6 text-base text-stone-400 font-bold pt-4">

                            <button onclick="handleGuestLogin()" class="hover:text-ewha-deep hover:underline transition">비로그인 둘러보기</button>
                        </div>
                    </div>
                </div>

                            <div class="bg-stone-50 p-4 rounded-2xl border-2 border-stone-200">

                            </div>
                            <div class="bg-stone-50 p-4 rounded-2xl border-2 border-stone-200">

                            </div>
                        </div>
                    </div>
